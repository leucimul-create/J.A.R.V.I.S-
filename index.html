<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. Arc HUD</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* TELA 1: INTERFACE ARC REACTOR (HUD) */
        #assistant-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 25px;
            width: 100%;
        }

        /* Recipiente do Reator Arc HUD */
        .hud-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Círculo Central / Núcleo de Brilho */
        .hud-core {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #00aaff;
            box-shadow: 0 0 40px #00aaff, 0 0 80px rgba(0, 170, 255, 0.6);
            transition: all 0.5s ease;
            z-index: 5;
        }

        /* Anéis Externos Giratórios */
        .hud-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px dashed #00aaff;
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.3);
            transition: all 0.5s ease;
        }

        .ring-1 {
            width: 160px;
            height: 160px;
            animation: rotateClockwise 8s linear infinite;
        }

        .ring-2 {
            width: 220px;
            height: 220px;
            border: 1px dashed #00aaff;
            animation: rotateCounterClockwise 12s linear infinite;
        }

        .ring-3 {
            width: 280px;
            height: 280px;
            border: 2px dotted #00aaff;
            animation: rotateClockwise 20s linear infinite;
        }

        /* Linhas e Marcadores de Escaneamento HUD */
        .hud-scanner {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: rotateClockwise 15s linear infinite;
        }

        .hud-scanner::before, .hud-scanner::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom, transparent, #00aaff, transparent);
        }
        .hud-scanner::after {
            transform: rotate(90deg);
            left: 50%;
            top: 0;
        }

        /* Animações de Rotação */
        @keyframes rotateClockwise {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes rotateCounterClockwise {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }

        /* EFEITOS DE SINAL / ESTADOS DO REATOR */
        /* Ouvindo (Azul) */
        .status-ouvindo .hud-core { background-color: #00aaff; box-shadow: 0 0 40px #00aaff; }
        .status-ouvindo .hud-ring { border-color: #00aaff; }
        
        /* Pensando / Processando (Verde) */
        .status-pensando .hud-core { background-color: #00ff88; box-shadow: 0 0 40px #00ff88; }
        .status-pensando .hud-ring { border-color: #00ff88; }
        .status-pensando .hud-core { animation: pulseCore 0.5s infinite alternate; }

        /* Falando (Ciano Pulsante) */
        .status-falando .hud-core { background-color: #00e5ff; box-shadow: 0 0 50px #00e5ff; animation: talkPulse 0.3s infinite alternate; }
        .status-falando .hud-ring { border-color: #00e5ff; }

        @keyframes pulseCore {
            0% { transform: scale(0.9); }
            100% { transform: scale(1.1); }
        }

        @keyframes talkPulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.15); opacity: 1; }
        }

        /* Texto de Status Inferior */
        .status-text {
            color: #00aaff;
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 170, 255, 0.5);
            transition: all 0.5s ease;
        }

        /* Botão para Instalação PWA */
        #install-btn {
            display: none;
            background: #00aaff;
            border: none;
            color: #000;
            padding: 12px 24px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            border-radius: 5px;
            box-shadow: 0 0 15px #00aaff;
        }

        /* TELA 2: TELA TOTALMENTE PRETA COM LETRAS BRANCAS (CHAT) */
        #chat-screen {
            display: none;
            width: 100%;
            height: 100vh;
            background-color: #000;
            padding: 25px;
            flex-direction: column;
            justify-content: space-between;
        }

        /* ID ajustado para corresponder ao script externo */
        #chat-container {
            flex-grow: 1;
            overflow-y: auto;
            border-bottom: 1px solid #111;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 10px;
        }

        /* Letras Totalmente Brancas no Chat */
        .message, .msg-usuario, .msg-jarvis {
            color: #ffffff; 
            font-size: 18px;
            line-height: 1.6;
        }

        /* Seletores compatíveis com ambas as versões do script */
        .msg-usuario::before, .message.user::before { content: "SENHOR: "; color: #00aaff; font-weight: bold; }
        .msg-jarvis::before, .message.jarvis::before { content: "J.A.R.V.I.S.: "; color: #ff0055; font-weight: bold; }

        .input-area {
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex-grow: 1;
            background: transparent;
            border: 1px solid #222;
            color: #fff;
            padding: 15px;
            font-family: inherit;
            font-size: 16px;
            border-radius: 5px;
        }

        .input-area input:focus {
            outline: none;
            border-color: #00aaff;
        }
    </style>
</head>
<body>

    <div id="assistant-screen">
        <div class="hud-container status-ouvindo" id="hudSystem">
            <div class="hud-scanner"></div>
            <div class="ring-1 hud-ring"></div>
            <div class="ring-2 hud-ring"></div>
            <div class="ring-3 hud-ring"></div>
            <div class="hud-core"></div>
        </div>
        
        <div class="status-text" id="statusLabel">SISTEMA ONLINE - AGUARDANDO COMANDO</div>
        <button id="install-btn">INSTALAR APLICATIVO</button>

        <input type="text" id="initialInput" placeholder="Envie um comando por aqui..." onkeypress="checkInitialEnter(event)" style="background: transparent; border: 1px solid #00aaff; color: #fff; padding: 12px; text-align: center; font-family: inherit; border-radius: 4px; width: 280px; margin-top: 10px; outline: none; box-shadow: 0 0 10px rgba(0,170,255,0.2);">
    </div>

    <div id="chat-screen">
        <div id="chat-container">
            <div class="message jarvis">Protocolos HUD recolhidos. Interface limpa ativada. Como posso ajudar o senhor hoje?</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Escreva sua próxima pergunta..." onkeypress="checkChatEnter(event)">
        </div>
    </div>

    <script src="jarvis-brain.js"></script>

    <script>
        const hudSystem = document.getElementById('hudSystem');
        const statusLabel = document.getElementById('statusLabel');

        // Controla as animações do Reator Arc HUD
        // Usada pelo jarvis-brain.js para mudar para 'pensando', 'falando' ou 'ouvindo'
        function mudarEstadoHUD(estado, texto) {
            if (!hudSystem) return;
            hudSystem.className = "hud-container status-" + estado;
            statusLabel.innerText = texto;
            if(estado === 'ouvindo') statusLabel.style.color = '#00aaff';
            if(estado === 'pensando') statusLabel.style.color = '#00ff88';
            if(estado === 'falando') statusLabel.style.color = '#00e5ff';
        }

        // Transição imediata da Tela do Reator para a tela limpa de Chat ao pressionar Enter
        function checkInitialEnter(event) {
            if (event.key === 'Enter') {
                const initialInput = document.getElementById('initialInput');
                if (initialInput.value.trim() !== '') {
                    const text = initialInput.value;
                    
                    // Esconde a interface do HUD e mostra o Chat
                    document.getElementById('assistant-screen').style.display = 'none';
                    document.getElementById('chat-screen').style.display = 'flex';
                    
                    // Envia o texto direto para o script que faz a ponte com a Cloudflare
                    if (typeof enviarMensagemJarvis === "function") {
                        enviarMensagemJarvis(text);
                    } else if (typeof enviarMensagem === "function") {
                        enviarMensagem(text);
                    }
                    initialInput.value = '';
                }
            }
        }

        // Envia as perguntas subsequentes feitas de dentro da tela de chat
        function checkChatEnter(event) {
            if (event.key === 'Enter') {
                const input = document.getElementById('userInput');
                if (input.value.trim() !== '') {
                    if (typeof enviarMensagemJarvis === "function") {
                        enviarMensagemJarvis(input.value);
                    } else if (typeof enviarMensagem === "function") {
                        enviarMensagem(input.value);
                    }
                    input.value = '';
                }
            }
        }

        // Suporte para instalação como Aplicativo Móvel (PWA)
        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if(installBtn) installBtn.style.display = 'block';
        });

        if(installBtn) {
            installBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    deferredPrompt = null;
                    installBtn.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
